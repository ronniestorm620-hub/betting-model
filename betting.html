// ================= POISSON =================

function randomPoisson(lambda){
let L=Math.exp(-lambda);
let k=0,p=1;
do{
k++;
p*=Math.random();
}while(p>L);
return k-1;
}

// ================= CALC =================

function calc(){

let teams=db[league.value];
let h=teams?.[home.value];
let a=teams?.[away.value];

if(!h || !a){
out.innerHTML="⚠ Manglende data";
return;
}

if(home.value===away.value){
out.innerHTML="⚠ Vælg to forskellige hold";
return;
}

let expH,expA;

// ===== hjemme/ude model =====
let useHomeAway =
h.home && h.total &&
a.away && a.total;

if(useHomeAway){

expH=((h.home.a+a.away.d)+(h.total.a+a.total.d))/4;
expA=((a.away.a+h.home.d)+(a.total.a+h.total.d))/4;

}else{

let ha=h.a??h.total?.a??1;
let hd=h.d??h.total?.d??1;
let aa=a.a??a.total?.a??1;
let ad=a.d??a.total?.d??1;

expH=(ha+ad)/2;
expA=(aa+hd)/2;
}

expH=Math.max(0.1,expH);
expA=Math.max(0.1,expA);

// ===== Monte Carlo =====
const sims=100000;

let hw=0,d=0,aw=0;
let over15=0,over25=0,over35=0,over45=0,btts=0;
let scores={};

for(let i=0;i<sims;i++){

let hg=randomPoisson(expH);
let ag=randomPoisson(expA);

if(hg>ag) hw++;
else if(hg===ag) d++;
else aw++;

let total=hg+ag;

if(total>1) over15++;
if(total>2) over25++;
if(total>3) over35++;
if(total>4) over45++;

if(hg&&ag) btts++;

let key=hg+"-"+ag;
scores[key]=(scores[key]||0)+1;
}

hw/=sims;
d/=sims;
aw/=sims;
over15/=sims;
over25/=sims;
over35/=sims;
over45/=sims;
btts/=sims;

// ===== market checker til kombi =====

function marketHit(name,hg,ag){

let total = hg+ag;

switch(name){

case "Hjemmesejr": return hg>ag;
case "Uafgjort": return hg===ag;
case "Ude sejr": return ag>hg;

case "1X": return hg>=ag;
case "X2": return ag>=hg;
case "12": return hg!==ag;

case "Over 1.5": return total>1;
case "Over 2.5": return total>2;
case "Over 3.5": return total>3;
case "Over 4.5": return total>4;

case "Under 2.5": return total<3;
case "Under 3.5": return total<4;
case "Under 4.5": return total<5;

case "BTTS": return hg>0 && ag>0;
}

return false;
}

let under25=1-over25;
let under35=1-over35;
let under45=1-over45;

let dc1x=hw+d;
let dcx2=aw+d;
let dc12=hw+aw;

// ===== score =====
let bestScore="0-0",max=0;

for(let s in scores){
if(scores[s]>max){
max=scores[s];
bestScore=s;
}
}

let scoreProb=(max/sims*100).toFixed(1);

// ===== heatmap =====
let heatHTML="<br><b>Score heatmap:</b><br><table>";

for(let hg=0;hg<=5;hg++){
heatHTML+="<tr>";
for(let ag=0;ag<=5;ag++){

let p=(scores[hg+"-"+ag]||0)/sims;

let color="#eee";
if(p>0.08) color="#4caf50";
else if(p>0.04) color="#ffc107";
else if(p>0.02) color="#ff9800";

heatHTML+=`<td style="width:36px;height:36px;text-align:center;background:${color};border:1px solid #999;font-size:12px">
${hg}-${ag}<br>${(p*100).toFixed(0)}%</td>`;
}
heatHTML+="</tr>";
}
heatHTML+="</table>";

// ===== markets =====
let markets=[

{p:hw,name:"Hjemmesejr",type:"main"},
{p:d,name:"Uafgjort",type:"main"},
{p:aw,name:"Ude sejr",type:"main"},

{p:over15,name:"Over 1.5",type:"main"},
{p:over25,name:"Over 2.5",type:"main"},
{p:over35,name:"Over 3.5",type:"main"},
{p:over45,name:"Over 4.5",type:"main"},

{p:under25,name:"Under 2.5",type:"main"},
{p:under35,name:"Under 3.5",type:"main"},
{p:under45,name:"Under 4.5",type:"main"},

{p:btts,name:"BTTS",type:"main"},

{p:dc1x,name:"1X",type:"dc"},
{p:dcx2,name:"X2",type:"dc"},
{p:dc12,name:"12",type:"dc"}

].sort((a,b)=>b.p-a.p);

let mains=markets.filter(m=>m.type==="main");

// ===== smart filter =====

let filtered = mains.filter(m=>{

// hård blok mod ultra-safe spil
if(m.name==="Under 4.5" && under45 < 0.93) return false;

// over filtre
if(m.name==="Over 1.5" && over15 < 0.85) return false;
if(m.name==="Over 2.5" && over25 < 0.52) return false;
if(m.name==="Over 3.5" && over35 < 0.35) return false;

// under filtre
if(m.name==="Under 2.5" && under25 < 0.55) return false;
if(m.name==="Under 3.5" && under35 < 0.65) return false;

// BTTS skal også have tempo
if(m.name==="BTTS" && (btts < 0.68 || over25 < 0.50)) return false;

// undgå for lave sandsynligheder generelt
if(m.p < 0.28) return false;

return true;
});

if(!filtered.length) filtered=mains;

// smartere prioritering — betting zone filter

function zoneScore(p){

// dræb ultra-safe spam
if(p > 0.82) return -1;

// minimum kvalitet
if(p < 0.45) return -1;

// peak omkring 60–70%
return 1 - Math.abs(p - 0.65);

}

// behold kun markets i zonen
let zoned = filtered.filter(m => zoneScore(m.p) > 0);

let best;

// hvis vi har gode zone picks → brug dem
if(zoned.length){

zoned.sort((a,b)=> zoneScore(b.p) - zoneScore(a.p));
best = zoned[0];

}else{

// fallback = højeste sandsynlighed
filtered.sort((a,b)=> b.p - a.p);
best = filtered[0];



}

// ===== odds / EV =====

// ===== SMART KOMBI MOTOR v3 =====

let comboText = "";

let bestSingleScore = zoneScore(best.p);
let bestCombo = null;

// kun stærke singles må kombineres
let comboPool = markets.filter(m =>
m.type === "main" &&
m.p >= 0.55 &&
zoneScore(m.p) > 0
);

function getLine(name){
let m = name.match(/(\d\.\d)/);
return m ? parseFloat(m[1]) : null;
}

function conflict(a,b){

// Over vs Under = altid konflikt
if(a.name.includes("Over") && b.name.includes("Under")) return true;
if(a.name.includes("Under") && b.name.includes("Over")) return true;

// nested totals konflikt (fx Under 4.5 + Under 3.5)
let aLine = getLine(a.name);
let bLine = getLine(b.name);

if(aLine && bLine){

let aUnder = a.name.includes("Under");
let bUnder = b.name.includes("Under");
let aOver = a.name.includes("Over");
let bOver = b.name.includes("Over");

if(aUnder && bUnder) return true;
if(aOver && bOver) return true;
}

// BTTS konflikt med lave totals
if(a.name==="BTTS" && b.name==="Under 2.5") return true;
if(b.name==="BTTS" && a.name==="Under 2.5") return true;

// BTTS + Over 1.5 overlap (forbudt kombi)
if(a.name==="BTTS" && b.name==="Over 1.5") return true;
if(b.name==="BTTS" && a.name==="Over 1.5") return true;

return false;
}

for(let i=0;i<comboPool.length;i++){
for(let j=i+1;j<comboPool.length;j++){

let A = comboPool[i];
let B = comboPool[j];

if(conflict(A,B)) continue;

// hurtig sanity check
if(A.p * B.p < 0.25) continue;

// realistisk kombi sandsynlighed

let hits = 0;

for(let s in scores){

let [hg,ag] = s.split("-").map(Number);

if(
marketHit(A.name,hg,ag) &&
marketHit(B.name,hg,ag)
){
hits += scores[s];
}

}

let comboP = hits / sims;

// minimum kvalitet
if(comboP < 0.40) continue;

let z = zoneScore(comboP);
if(z <= 0) continue;

let comboScore = z * 1.1;

if(comboScore > bestSingleScore){

if(!bestCombo || comboScore > bestCombo.score){

bestCombo = {
name: A.name + " + " + B.name,
p: comboP,
score: comboScore
};

}

}

}
}

if(bestCombo){

comboText = `
<br><b>🔥 Kombi bedre end single:</b><br>
${bestCombo.name}<br>
Sandsynlighed: ${(bestCombo.p*100).toFixed(1)}%<br>
`;

}

let odds=Number(document.getElementById("odds").value)||0;

let activePick = best;
let activeProb = best.p;

if(bestCombo){
activePick = bestCombo;
activeProb = bestCombo.p;
}

let ev=(odds)?(activeProb*odds-1):0;

let verdict=ev>0?"✅ VALUE":"❌ DROP";
let color=ev>0?"green":"red";

// ===== risiko =====

let risk="🔴 Høj";
if(activeProb>0.65) risk="🟢 Lav";
else if(activeProb>0.55) risk="🟡 Medium";

// sorter efter rækkefølge

// ===== tabel =====

// ønsket rækkefølge
const order = [
"Hjemmesejr",
"Uafgjort",
"Ude sejr",
"BTTS",
"Over 1.5",
"Over 2.5",
"Over 3.5",
"Over 4.5",
"Under 2.5",
"Under 3.5",
"Under 4.5"
];

// sorter markets
const sortedMarkets = order
.map(name => mains.find(m => m.name === name))
.filter(Boolean);

// byg tabel
let table = `<br><b>📊 Markets</b>
<table style="width:100%;border-collapse:collapse">
<tr><th>Market</th><th>%</th><th></th></tr>`;

sortedMarkets.forEach(m=>{
table += `<tr>
<td>${m.name}</td>
<td>${(m.p*100).toFixed(1)}%</td>

<td>${m.name===activePick.name?"🤖":""}</td>

</tr>`;
});

table += "</table>";

// ===== output =====

lastPick = activePick;

out.innerHTML=`

Forventede mål: ${expH.toFixed(2)} – ${expA.toFixed(2)}<br>
Score: ${bestScore} (${scoreProb}%)<br><br>

👉 Valgt spil: <b>${activePick.name}</b><br>
Model: ${(activeProb*100).toFixed(1)}%<br>

EV: ${ev.toFixed(2)}<br>
Risiko: ${risk}<br>
<span style="color:${color};font-weight:bold">${verdict}</span>

${table}
${comboText}
${heatHTML}

`;
}


// ===== TRACKING =====

function saveBet(){

if(!lastPick){
alert("Beregn først et spil!");
return;
}

let match = home.value + " vs " + away.value;
let bet = lastPick.name;
let odds = parseFloat(document.getElementById("odds").value) || 0;
let stake = 100;

let table = document.getElementById("log");

// dublet check
for(let i=1;i<table.rows.length;i++){
let r = table.rows[i];
if(r.cells[0].innerText===match && r.cells[1].innerText===bet){
alert("Dette spil er allerede gemt!");
return;
}
}

// opret række
let row = table.insertRow();

row.insertCell(0).innerText = match;
row.insertCell(1).innerText = bet;
row.insertCell(2).innerText = odds || "-";
row.insertCell(3).innerText = stake;
row.insertCell(4).innerText = (lastPick.p*100).toFixed(1)+"%";

// RESULTAT knapper
let resultCell = row.insertCell(5);

let winBtn = document.createElement("button");
winBtn.innerText = "Win";

let lossBtn = document.createElement("button");
lossBtn.innerText = "Loss";

resultCell.appendChild(winBtn);
resultCell.appendChild(lossBtn);

// profit celle
let profitCell = row.insertCell(6);
profitCell.innerText = "-";

// win klik

winBtn.onclick = ()=>{
let profit = odds * stake - stake;
profitCell.innerText = profit.toFixed(2);
profitCell.style.color="green";
updateTotals();
};

// loss klik

lossBtn.onclick = ()=>{
profitCell.innerText = (-stake).toFixed(2);
profitCell.style.color="red";
updateTotals();
};

// slet
let del = row.insertCell(7);
del.innerHTML="🗑";
del.style.cursor="pointer";

del.onclick=()=>{
row.remove();
updateTotals();
};

updateTotals();

}

// ===== CSV EXPORT =====

function exportCSV(){

let table = document.getElementById("log");
let rows = table.rows;

if(rows.length <= 1){
alert("Ingen spil at exportere!");
return;
}

let csv = [];

for(let i=0;i<rows.length;i++){

let cols = rows[i].cells;
let rowData = [];

for(let j=0;j<cols.length-1;j++){ // spring slet kolonne over
rowData.push(cols[j].innerText);
}

csv.push(rowData.join(","));
}

// lav fil
let blob = new Blob([csv.join("\n")], {type:"text/csv"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "betting_tracking.csv";
a.click();

URL.revokeObjectURL(url);

alert("CSV exporteret!");
}

// ===== TOTAL TRACKING =====

function updateTotals(){

let table = document.getElementById("log");

let totalStake = 0;
let totalProfit = 0;

for(let i=1;i<table.rows.length;i++){

let row = table.rows[i];

let stake = parseFloat(row.cells[3].innerText) || 0;
let profit = parseFloat(row.cells[6].innerText) || 0;

totalStake += stake;
totalProfit += profit;

}

document.getElementById("totals").innerHTML =
"Total indsats: " + totalStake.toFixed(2) + " KR<br>" +
"Total profit: " + totalProfit.toFixed(2) + " KR";

}
