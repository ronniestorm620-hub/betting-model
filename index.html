function getCache(key){

let data = localStorage.getItem(key);
if(!data) return null;

let parsed = JSON.parse(data);

// check om cache er udløbet
if(Date.now() > parsed.expire){
localStorage.removeItem(key);
return null;
}

return parsed.value;
}

function setCache(key,value){

localStorage.setItem(key, JSON.stringify({
value:value,
expire: Date.now() + CACHE_HOURS*60*60*1000
}));

}

// ===== PRO INJURY IMPACT (starter vs reserve vs star) =====
async function fetchInjuries(teamId){

try{

let res = await fetch(
`${API_URL}/injuries?team=${teamId}&league=${league.value}&season=${CURRENT_SEASON}`,
{
headers:{ "x-apisports-key": API_KEY }
});

let data = await res.json();

let impact = {
attack:1,
defense:1
};

if(!data.response || data.response.length===0)
return impact;

let startersMissing = 0;

data.response.forEach(p=>{

let pos = p.player.position;
let games = p.statistics?.games?.appearences || 0;

// ===== importance level =====

// reserve (spiller næsten ikke)
let importance = 0.5;

// rotation
if(games >= 10) importance = 1;

// fast starter
if(games >= 20) importance = 1.6;

// nøglespiller / stjerne
if(games >= 30) importance = 2.4;

if(importance >= 1.6) startersMissing++;

// ===== position impact =====

if(pos==="Attacker")
impact.attack *= (1 - 0.05 * importance);

if(pos==="Midfielder")
impact.attack *= (1 - 0.025 * importance);

if(pos==="Defender")
impact.defense *= (1 + 0.05 * importance);

if(pos==="Goalkeeper")
impact.defense *= (1 + 0.15 * importance);

});

// ⭐ ekstra straf hvis mange startere mangler
if(startersMissing >= 3){
impact.attack *= 0.92;
impact.defense *= 1.08;
}

// sikkerhedsgrænser
impact.attack = Math.max(0.7, impact.attack);
impact.defense = Math.min(1.5, impact.defense);

return impact;

}catch(e){
return {attack:1,defense:1};
}
}

let winRate = played ? wins/played : 0.5;

function marketHit(name,hg,ag){

let total = hg+ag;

switch(name){

case "Uafgjort": return hg===ag;
case "Ude sejr": return ag>hg;

}

return false;
}

function randomPoisson(lambda){
let L=Math.exp(-lambda);
let k=0,p=1;
do{
k++;
p*=Math.random();
}while(p>L);
return k-1;
}

// ===== KELLY STAKE =====
function calcKellyStake(prob, odds){

if(!odds || odds <= 1) return 0;

let edge = (prob * odds - 1) / (odds - 1);

// ingen value → ingen bet
if(edge <= 0) return 0;

let stake = BANKROLL * edge * KELLY_FRACTION;

// sikkerheds cap
stake = Math.min(stake, BANKROLL * 0.1);

// minimum stake
if(stake < 50) stake = Math.min(50, BANKROLL);

return Math.round(stake);
}

if(b.name==="1X" && a.name==="Hjemmesejr") return true;

if(b.name==="X2" && a.name==="Ude sejr") return true;

if(a.name==="12" && ["Hjemmesejr","Ude sejr"].includes(b.name)) return true;
if(b.name==="12" && ["Hjemmesejr","Ude sejr"].includes(a.name)) return true;

return false;
}

// ===== SMART PRIORITY ENGINE =====

function marketBias(name){

// dæmp hjemmesejr dominans
if(name === "Hjemmesejr")
return 0.88;

// straf dobbeltchance
if(["1X","X2","12"].includes(name))
return 0.75;

// straf ultra-safe totals
if(name==="Under 4.5")
return 0.70;

return 1;
}

function zoneScore(p){

// fjern ultra-safe spam
if(p > 0.85) return 0;

// fjern for risky
if(p < 0.35) return 0;

// betting sweet spot
return 1 - Math.abs(p - 0.58);
}

//

function safeFormBias(homeTeam, awayTeam){

   let bias = 1;

   if(homeTeam?.home?.win)
       bias += (homeTeam.home.win - 0.5) * 0.15;

   if(awayTeam?.away?.win)
       bias -= (awayTeam.away.win - 0.5) * 0.10;

   return Math.max(0.85, Math.min(1.15, bias));
}

function calc(){

Promise.all([
fetchTeamStats(home.value),
fetchTeamStats(away.value),
fetchInjuries(home.value),
fetchInjuries(away.value)
]).then(([h,a,hi,ai])=>{

if(!h || !a){
out.innerHTML="⚠ Manglende data fra API";
return;
}

if(home.value===away.value){
out.innerHTML="⚠ Vælg to forskellige hold";
return;
}

let expH,expA;

// ===== hjemme/ude model =====
let useHomeAway =
h.home && h.total &&
a.away && a.total;

if(useHomeAway){

expH=((h.home.a+a.away.d)+(h.total.a+a.total.d))/4;
expA=((a.away.a+h.home.d)+(a.total.a+h.total.d))/4;

}else{

let ha=h.a??h.total?.a??1;
let hd=h.d??h.total?.d??1;
let aa=a.a??a.total?.a??1;
let ad=a.d??a.total?.d??1;

expH=(ha+ad)/2;
expA=(aa+hd)/2;
}

expH=Math.max(0.1,expH);
expA=Math.max(0.1,expA);

// goal inflation correction
expH *= 0.97;
expA *= 0.97;

// ⭐ injury impact
expH *= hi.attack;
expA *= ai.attack;

expH *= ai.defense;
expA *= hi.defense;

// ⭐ form bias
let bias = safeFormBias(h,a);
expH *= bias;
expA /= bias;

// ⭐ stabilisering
expH=Math.max(0.2, Math.min(expH,4));
expA=Math.max(0.2, Math.min(expA,4));

// ===== Monte Carlo =====
const sims = AUTO_MODE ? 40000 : 100000;

let hw=0,d=0,aw=0;
let over15=0,over25=0,over35=0,over45=0,btts=0;
let scores={};

for(let i=0;i<sims;i++){

let hg=randomPoisson(expH);
let ag=randomPoisson(expA);

if(hg>ag) hw++;
else if(hg===ag) d++;
else aw++;

let total=hg+ag;

if(total>1) over15++;
if(total>2) over25++;
if(total>3) over35++;
if(total>4) over45++;

if(hg&&ag) btts++;

let key=hg+"-"+ag;
scores[key]=(scores[key]||0)+1;
}

hw/=sims;
d/=sims;
aw/=sims;
over15/=sims;
over25/=sims;
over35/=sims;
over45/=sims;
btts/=sims;
window.lastScores = scores;
window.lastSims = sims;

// ===== market checker til kombi =====



let under25=1-over25;
let under35=1-over35;
let under45=1-over45;

let dc1x=hw+d;
let dcx2=aw+d;
let dc12=hw+aw;

// ===== score =====
let bestScore="0-0",max=0;

for(let s in scores){
if(scores[s]>max){
max=scores[s];
bestScore=s;
}
}

let scoreProb=(max/sims*100).toFixed(1);

// ===== heatmap =====
let heatHTML="<br><b>Score heatmap:</b><br><table>";

for(let hg=0;hg<=5;hg++){
heatHTML+="<tr>";
for(let ag=0;ag<=5;ag++){

let p=(scores[hg+"-"+ag]||0)/sims;

let color="#eee";
if(p>0.08) color="#4caf50";
else if(p>0.04) color="#ffc107";
else if(p>0.02) color="#ff9800";

heatHTML+=`<td style="width:36px;height:36px;text-align:center;background:${color};border:1px solid #999;font-size:12px">
${hg}-${ag}<br>${(p*100).toFixed(0)}%</td>`;
}
heatHTML+="</tr>";
}
heatHTML+="</table>";

// ===== markets =====
let markets=[

{p:hw,name:"Hjemmesejr",type:"main"},
{p:d,name:"Uafgjort",type:"main"},
{p:aw,name:"Ude sejr",type:"main"},

{p:over15,name:"Over 1.5",type:"main"},
{p:over25,name:"Over 2.5",type:"main"},
{p:over35,name:"Over 3.5",type:"main"},
{p:over45,name:"Over 4.5",type:"main"},

{p:under25,name:"Under 2.5",type:"main"},
{p:under35,name:"Under 3.5",type:"main"},
{p:under45,name:"Under 4.5",type:"main"},

{p:btts,name:"BTTS",type:"main"},

{p:dc1x,name:"1X",type:"dc"},
{p:dcx2,name:"X2",type:"dc"},
{p:dc12,name:"12",type:"dc"}

].sort((a,b)=>b.p-a.p);

let mains = markets; // inkluder også dobbeltchance

// ===== smart filter =====

let filtered = mains.filter(m=>{

// ===== AUTO BLACKLIST =====
if(LEARNING_MODE && window.marketROI){

let roi = window.marketROI[m.name];

// hvis market historisk meget dårlig → ignorer
if(roi !== undefined && roi < -30) return false;

}

// anti 12 spam
if(m.name==="12" && m.p > 0.68) return false;

// straf dobbeltchance spam
if(["1X","X2","12"].includes(m.name) && m.p > 0.75)
return false;

// hård blok mod ultra-safe spil
if(m.name==="Under 4.5" && under45 < 0.98) return false;

// over filtre
if(m.name==="Over 1.5" && over15 < 0.85) return false;
if(m.name==="Over 2.5" && over25 < 0.50) return false;
if(m.name==="Over 3.5" && over35 < 0.35) return false;

// under filtre
if(m.name==="Under 2.5" && under25 < 0.55) return false;
if(m.name==="Under 3.5" && under35 < 0.65) return false;

// BTTS skal også have tempo
if(m.name==="BTTS" && (btts < 0.68 || over25 < 0.50)) return false;

// undgå for lave sandsynligheder generelt
if(m.p < 0.28) return false;

return true;
});

if(!filtered.length) filtered=mains;

// smartere prioritering — betting zone filter


// behold kun markets i zonen
let zoned = filtered.filter(m => zoneScore(m.p) > 0);

let best;

// hvis vi har gode zone picks → brug dem
if(zoned.length){

zoned.sort((a,b)=>
(zoneScore(b.p)*marketBias(b.name)) -
(zoneScore(a.p)*marketBias(a.name))
);
best = zoned[0];

}else{

// fallback = højeste sandsynlighed
filtered.sort((a,b)=>
(b.p*marketBias(b.name)) -
(a.p*marketBias(a.name))
);

best = filtered[0];


}

// ===== odds / EV =====

// ===== SMART KOMBI MOTOR v3 =====

let comboText = "";

let bestSingleScore = zoneScore(best.p) + (best.p * 0.4);
let bestCombo = null;

// kun stærke singles må kombineres
let comboPool = markets.filter(m =>

// anti 12 spam også i kombi
!(m.name==="12" && m.p > 0.65) &&

m.p >= 0.55 &&
zoneScore(m.p) > 0 &&
m.p < 0.85
);

for(let i=0;i<comboPool.length;i++){
for(let j=i+1;j<comboPool.length;j++){

let A = comboPool[i];
let B = comboPool[j];

if(conflict(A,B)) continue;

// ⭐ STEP 3 — stop safe + safe kombier
if(A.p > 0.80 && B.p > 0.80) continue;

// hurtig sanity check
if(A.p * B.p < 0.25) continue;

// realistisk kombi sandsynlighed

let hits = 0;

for(let s in scores){

let [hg,ag] = s.split("-").map(Number);

if(
marketHit(A.name,hg,ag) &&
marketHit(B.name,hg,ag)
){
hits += scores[s];
}

}

let comboP = hits / sims;

let impliedOdds = 1 / comboP;

// blokér kedelige kombier
if(impliedOdds < 1.70) continue;

// minimum kvalitet
if(comboP < 0.40) continue;

let z = zoneScore(comboP);
if(z <= 0) continue;

let comboScore = z * Math.sqrt(impliedOdds);

if(comboScore > bestSingleScore * 1.10){

if(!bestCombo || comboScore > bestCombo.score){

bestCombo = {
name: A.name + " + " + B.name,
p: comboP,
score: comboScore
};

}

}

}
}

if(bestCombo){

comboText = `
<br><b>🔥 Kombi bedre end single:</b><br>
${bestCombo.name}<br>
Sandsynlighed: ${(bestCombo.p*100).toFixed(1)}%<br>
`;

}

let oddsInput = document.getElementById("odds").value;
let odds = oddsInput ? Number(oddsInput) : null;

let activePick = best;
let activeProb = best.p;

if(bestCombo){
activePick = bestCombo;
activeProb = bestCombo.p;

// ROI check også for kombi
if(LEARNING_MODE && window.marketROI){

let roi = window.marketROI[activePick.name];

if(roi !== undefined){
if(roi < ROI_SOFT_LIMIT) activeProb *= 0.95;
if(roi < ROI_HARD_LIMIT) activeProb *= 0.88;
}

}
}

let ev = odds ? (activeProb*odds-1) : null;
let kellyStake = odds ? calcKellyStake(activeProb, odds) : null;

// ===== LEARNING WARNING =====

let learningNote = "";

if(LEARNING_MODE && window.marketROI){

let roi = window.marketROI[activePick.name];

if(roi !== undefined){

if(roi < ROI_HARD_LIMIT)
learningNote = "🚨 Learning: historisk meget dårlig performance";

else if(roi < ROI_SOFT_LIMIT)
learningNote = "⚠ Learning: svag historisk ROI";

}
}

const softEdge = -0.08;

let verdict;
let color;

if(ev > 0.05){
    verdict = "🔥 STRONG VALUE";
    color = "green";
}
else if(ev > 0){
    verdict = "✅ VALUE";
    color = "limegreen";
}
else if(ev > softEdge){
    verdict = "🟡 SOFT VALUE";
    color = "orange";
}
else{
    verdict = "❌ DROP";
    color = "red";
}

// ===== risiko =====

let risk="🔴 Høj";

if(activeProb >= 0.65)
    risk="🟢 Lav";
else if(activeProb >= 0.58)
    risk="🟡 Medium";
else risk="🔴 Høj";

window.lastRisk = risk;

// sorter efter rækkefølge

// ===== tabel =====

// ønsket rækkefølge
const order = [
"Hjemmesejr",
"Uafgjort",
"Ude sejr",

"1X",
"X2",
"12",

"BTTS",
"Over 1.5","Over 2.5","Over 3.5","Over 4.5",
"Under 2.5","Under 3.5","Under 4.5"
];

// sorter markets
const sortedMarkets = order
.map(name => mains.find(m => m.name === name))
.filter(Boolean);

// byg tabel
let table = `<br><b>📊 Markets</b>
<table style="width:100%;border-collapse:collapse">
<tr><th>Market</th><th>%</th><th></th></tr>`;

sortedMarkets.forEach(m=>{
table += `<tr>
<td>${m.name}</td>
<td>${(m.p*100).toFixed(1)}%</td>

<td>${m.name===activePick.name?"🤖":""}</td>

</tr>`;
});

table += "</table>";

// ===== output =====

lastPick = activePick;

let homeLogo =
home.options[home.selectedIndex]?.dataset?.logo ||
"https://media.api-sports.io/football/teams/0.png";

let awayLogo =
away.options[away.selectedIndex]?.dataset?.logo ||

out.innerHTML=`

</div>

Forventede mål: ${expH.toFixed(2)} – ${expA.toFixed(2)}<br>
Score: ${bestScore} (${scoreProb}%)<br><br>

👉 Valgt spil: <b>${activePick.name}</b><br>
Model: ${(activeProb*100).toFixed(1)}%<br>

EV: ${ev !== null ? ev.toFixed(2) : "-"}<br>
💰 Kelly indsats: ${kellyStake ?? "-"} kr<br>
Risiko: ${risk}<br>

function saveBet(){

let awayOpt = away.options[away.selectedIndex];

let homeName = homeOpt.text;
let awayName = awayOpt.text;

let awayLogo = awayOpt.dataset.logo;

let matchHTML = `
<img src="${homeLogo}" width="20">
${homeName}
vs
<img src="${awayLogo}" width="20">
${awayName}
`;
let bet;
let modelP;
let odds;
let stake;

// ===== vælg hvad der gemmes =====

if(mode==="custom"){

if(!document.getElementById("comboOdds").value){
alert("Indtast kombi odds");
return;
}

let A=m1.value;
let B=m2.value;

// ===== conflict check =====

let mockA={name:A};
let mockB={name:B};

if(conflict(mockA,mockB)){
comboOut.innerHTML="❌ Konflikt mellem markets — kombi er ikke mulig";
return;
}

if(!window.lastScores){
alert("Beregn kamp først");
return;
}

let hits=0;

for(let s in window.lastScores){

let [hg,ag]=s.split("-").map(Number);

if(
marketHit(A,hg,ag) &&
marketHit(B,hg,ag)
){
hits+=window.lastScores[s];
}

}

modelP = hits/window.lastSims;
bet = A+" + "+B;
odds = parseFloat(document.getElementById("comboOdds").value)||0;
stake = calcKellyStake(modelP, odds);
if(stake === 0){
alert("Ingen value — bet ikke gemt");
return;
}

}else{

if(!lastPick){
alert("Beregn først!");
return;
}

bet = lastPick.name;
modelP = lastPick.p;
odds = Number(oddsInput.value.trim());

if(!odds || odds <= 1){
alert("Indtast gyldige bookmaker odds");
return;
}
// ⭐ KELLY STAKE HER
stake = calcKellyStake(modelP, odds);
if(stake === 0){
alert("Ingen value — bet ikke gemt");
return;
}

}

// ⭐ MINIMUM MODEL FILTER (pro version)
if(modelP < 0.58){
alert("Model under 58% — bet ikke gemt");
return;
}

// ===== EV / risiko =====

let ev=(odds)?(modelP*odds-1):0;

// minimum EV krav
let noValue = false;

if(ev < 0.03){
noValue = true;
stake = 0; // Ingen indsats
}

let risk="🔴 Høj";

if(modelP >= 0.65)
    risk="🟢 Lav";
else if(modelP >= 0.58)
    risk="🟡 Medium";

// ⭐ bloker høj risiko bets
if(risk.includes("🔴")){
alert("For høj risiko — bet ikke gemt");
return;
}

const softEdge = -0.08;

let verdict;

if(ev > 0.05){
    verdict = "🔥 STRONG VALUE";
}
else if(ev > 0){
    verdict = "✅ VALUE";
}
else if(ev > softEdge){
    verdict = "🟡 SOFT VALUE";
}
else{
    verdict = "❌ DROP";
}

// ===== tabel =====

let table=document.getElementById("log");

// dublet check kun for samme kamp
for(let i=1;i<table.rows.length;i++){

let r=table.rows[i];

let existingMatch = r.cells[0].innerText;
let existingBet = r.cells[1].innerText;

if(
existingMatch.includes(homeName) &&
existingMatch.includes(awayName) &&
existingBet === bet
){
alert("Spil allerede gemt for denne kamp");
return;
}
}

let row=table.insertRow();

row.insertCell(0).innerHTML = matchHTML;
row.insertCell(1).innerText=bet;
row.insertCell(2).innerText=odds||"-";
row.insertCell(3).innerText=stake;
row.insertCell(4).innerText=(modelP*100).toFixed(1)+"%";
row.insertCell(5).innerText=risk;
row.insertCell(6).innerText = noValue ? "📊 NO VALUE (log)" : verdict;

// result
let clv=row.insertCell(7);
clv.innerText="-";

let res=row.insertCell(8);

let win=document.createElement("button");
win.innerText="Win";
win.type="button";

let loss=document.createElement("button");
loss.innerText="Loss";
loss.type="button";

res.appendChild(win);
res.appendChild(loss);

// profit
let profit=row.insertCell(9);
profit.innerText="-";
profit.style.color="black";

// delete
let del=row.insertCell(10);
del.innerHTML="🗑";

win.onclick=()=>{

if(row.dataset.result==="win") return;

if(row.dataset.result==="loss"){
BANKROLL += stake;
}

let p = odds*stake-stake;

BANKROLL += p;

profit.innerText=p.toFixed(2);
profit.style.color="green";
calcCLV(row);

row.dataset.result="win";
win.disabled = true;
loss.disabled = true;

localStorage.setItem("bankroll", BANKROLL);

updateTotals();
saveStorage();
};

loss.onclick=()=>{

if(row.dataset.result==="loss") return;

if(row.dataset.result==="win"){
let p = odds*stake-stake;
BANKROLL -= p;
}

profit.innerText=(-stake).toFixed(2);
profit.style.color="red";
calcCLV(row);

BANKROLL -= stake;

row.dataset.result="loss";
win.disabled = true;
loss.disabled = true;

localStorage.setItem("bankroll", BANKROLL);

updateTotals();
saveStorage();
};

del.onclick=()=>{

let stake=parseFloat(row.cells[3].innerText)||0;
let odds=parseFloat(row.cells[2].innerText)||0;

// rollback bankroll før sletning
if(row.dataset.result==="win"){
let p=odds*stake-stake;
BANKROLL -= p;
}
else if(row.dataset.result==="loss"){
BANKROLL += stake;
}

localStorage.setItem("bankroll", BANKROLL);

row.remove();
updateTotals();
saveStorage();
};

updateTotals();
saveStorage();
}

function calcCombo(){

let A=m1.value;
let B=m2.value;

// dublet check først
if(A===B){
comboOut.innerHTML="⚠ Vælg to forskellige markets";
return;
}

// conflict check
if(conflict({name:A},{name:B})){
comboOut.innerHTML="❌ Konflikt mellem markets — kombi er ikke mulig";
return;
}

if(!window.lastScores){
comboOut.innerHTML="⚠ Beregn kamp først";
return;
}

let hits=0;

for(let s in window.lastScores){

let [hg,ag]=s.split("-").map(Number);

if(
marketHit(A,hg,ag) &&
marketHit(B,hg,ag)
){
hits+=window.lastScores[s];
}

}

let modelP = hits/window.lastSims;

let odds = parseFloat(document.getElementById("comboOdds").value)||0;

let text = `
🔥 Kombi: ${A} + ${B}<br>
Model: ${(modelP*100).toFixed(1)}%<br>
`;

if(odds>0){

let bookie = 1/odds;
let edge = modelP - bookie;

const softEdge = -0.08;

let verdict;
let color;

if(edge > 0.05){
    verdict = "🔥 STRONG VALUE";
    color = "green";
}
else if(edge > 0){
    verdict = "✅ VALUE";
    color = "limegreen";
}
else if(edge > softEdge){
    verdict = "🟡 SOFT VALUE";
    color = "orange";
}
else{
    verdict = "❌ DROP";
    color = "red";
}

text+=`
Odds: ${odds}<br>
Bookie krav: ${(bookie*100).toFixed(1)}%<br>
Edge: ${(edge*100).toFixed(1)}%<br>
<span style="color:${color};font-weight:bold">${verdict}</span>
`;

}

comboOut.innerHTML=text;
}

// ===== MARKET ROI STATS =====

function marketStats(){

let table=document.getElementById("log");
window.marketROI = {};
let markets={};
let html="<br><b>📊 Market performance</b><br>";

// ===== samle data =====
for(let i=1;i<table.rows.length;i++){

// skip bets uden resultat
if(!table.rows[i].dataset.result) continue;

let bet=table.rows[i].cells[1].innerText;
let stake=parseFloat(table.rows[i].cells[3].innerText)||0;
let profit=parseFloat(table.rows[i].cells[9].innerText)||0;

if(!markets[bet])
markets[bet]={stake:0,profit:0,bets:0};

markets[bet].stake+=stake;
markets[bet].profit+=profit;
markets[bet].bets++;
}

// ===== beregn ROI efter loop =====
for(let m in markets){

let roi=(markets[m].profit/markets[m].stake*100)||0;

if(markets[m].bets >= MIN_LEARNING_BETS)
window.marketROI[m] = roi;

let color="black";
if(roi>5) color="green";
else if(roi<0) color="red";

html+=`<span style="color:${color}">
${m} → ROI ${roi.toFixed(1)}% (${markets[m].bets} bets)
</span><br>`;
}

totals.innerHTML+=html;
}

// ===== MODEL CALIBRATION =====

function calibrationStats(){

let table=document.getElementById("log");

// bins i 5% intervaller
let bins={
"0-45":{bets:0,wins:0},
"45-50":{bets:0,wins:0},
"50-55":{bets:0,wins:0},
"55-60":{bets:0,wins:0},
"60-65":{bets:0,wins:0},
"65-70":{bets:0,wins:0},
"70-75":{bets:0,wins:0},
"75+":{bets:0,wins:0}
};

for(let i=1;i<table.rows.length;i++){

let row=table.rows[i];

// skip åbne bets
if(!row.dataset.result) continue;

let modelText=row.cells[4].innerText.replace("%","");
let modelP=parseFloat(modelText);

if(isNaN(modelP)) continue;

let result=row.dataset.result==="win";

let bin;

if(modelP<45) bin="0-45";
else if(modelP<50) bin="45-50";
else if(modelP<55) bin="50-55";
else if(modelP<60) bin="55-60";
else if(modelP<65) bin="60-65";
else if(modelP<70) bin="65-70";
else if(modelP<75) bin="70-75";
else bin="75+";

bins[bin].bets++;
if(result) bins[bin].wins++;
}

// build output
let html="<br><b>🎯 Model Calibration</b><br>";

for(let b in bins){

if(bins[b].bets===0) continue;

let winrate=(bins[b].wins/bins[b].bets*100);
let color="black";

if(winrate > parseInt(b.split("-")[0]||75)) color="green";
else color="red";

html+=`
<span style="color:${color}">
${b}% → ${(winrate).toFixed(1)}% winrate
(${bins[b].bets} bets)
</span><br>
`;
}

totals.innerHTML+=html;
}

// ===== SCAN ALLE KAMPE I DAG (100% samme model som Beregn) =====
async function scanToday(){

AUTO_MODE = true;

autoOut.innerHTML="🔎 Scanner alle kampe med fuld model...";

let today = new Date();
let tomorrow = new Date();
tomorrow.setDate(today.getDate()+1);

let dates = [
today.toISOString().split("T")[0],
tomorrow.toISOString().split("T")[0]
];

let allGames = [];

for(let date of dates){

let res = await fetch(
`${API_URL}/fixtures?date=${date}`,
{headers:{ "x-apisports-key": API_KEY }}
);

let data = await res.json();

allGames.push(...data.response);

}

if(!allGames.length){
autoOut.innerHTML="Ingen kampe i dag";
AUTO_MODE = false;
return;
}

let results=[];

for(let game of allGames){

// ✅ brug kun dine 40 ligaer
// spring europæiske turneringer over i AUTO
const EXCLUDE_AUTO = [2,3,848];

if(
!TOP_LEAGUES.includes(game.league.id) ||
EXCLUDE_AUTO.includes(game.league.id)
) continue;

// sæt liga
league.value = game.league.id;
await loadTeams();

// vent til teams er loaded fra API
while(home.options.length <= 1){
  await new Promise(r=>setTimeout(r,300));
}

// sæt hold
home.value = game.teams.home.id;
away.value = game.teams.away.id;

// kør DIN eksisterende model
await new Promise(resolve=>{
calc();
setTimeout(resolve,1500); // vent på Monte Carlo
});

// brug samme pick
if(!lastPick) continue;

let prob=lastPick.p;
// minimum odds for 3% value
let minOdds = 1 / prob;
let stake = calcKellyStake(prob, minOdds*1.05);

let risk="🔴 Høj";
if(prob>=0.65) risk="🟢 Lav";
else if(prob>=0.58) risk="🟡 Medium";

// samme krav som saveBet
if(prob<0.58) continue;
// tillad høj risiko hvis value er høj
if(risk.includes("🔴") && prob < 0.55) continue;

results.push(`
<div style="border-bottom:1px solid #ddd;padding:10px">

🔥 ${game.teams.home.name} vs ${game.teams.away.name}<br>
→ ${lastPick.name}<br>
Model ${(prob*100).toFixed(1)}%<br>

Minimum odds: ${minOdds.toFixed(2)}<br>
💰 Anbefalet indsats: ${stake} kr<br>

Indtast dine odds:
<input type="number" step="0.01"
oninput="this.nextElementSibling.innerText=
calcKellyStake(${prob},this.value)+' kr'">

Ny indsats: <span>${stake} kr</span><br>

<button onclick="saveAutoBet(
'${game.teams.home.name}',
'${game.teams.away.name}',
'${lastPick.name}',
${prob},
this.parentElement.querySelector('input').value,
${game.fixture.id}
)"
style="background:#1e88e5;margin-top:5px">
💾 Gem spil
</button>

</div>
`);
}

// gem auto bets permanent
// gem altid scan resultat (også tomt)
localStorage.setItem("autoBets", JSON.stringify(results));

autoOut.innerHTML = results.length
? `<h3>🤖 Auto fundne bets</h3>${results.join("")}`
: "Ingen klare value bets i dag";
AUTO_MODE = false;
}

// ===== GEM AUTO BET FRA ROBOT =====
function saveAutoBet(homeName, awayName, betName, prob, odds, fixtureId){

if(!odds){
alert("Indtast odds først");
return;
}

odds = parseFloat(odds);

let stake = calcKellyStake(prob, odds);

if(stake === 0){
    stake = 0; // gem bet som tracking uden indsats
}

// samme minimum regler som normal save
if(prob < 0.58){
alert("Model under 58%");
return;
}

let table=document.getElementById("log");

let row=table.insertRow();
row.dataset.fixtureId = fixtureId;
row.dataset.openOdds = odds;

row.insertCell(0).innerText = homeName+" vs "+awayName;
row.insertCell(1).innerText = betName;
row.insertCell(2).innerText = odds;
row.insertCell(3).innerText = stake;
row.insertCell(4).innerText = (prob*100).toFixed(1)+"%";

let risk="🔴 Høj";
if(prob>=0.65) risk="🟢 Lav";
else if(prob>=0.58) risk="🟡 Medium";

row.insertCell(5).innerText=risk;
row.insertCell(6).innerText="🤖 AUTO";

// result knapper
let clv=row.insertCell(7);
clv.innerText="-";

let res=row.insertCell(8);

let win=document.createElement("button");
win.innerText="Win";
win.type="button";

let loss=document.createElement("button");
loss.innerText="Loss";
loss.type="button";

res.appendChild(win);
res.appendChild(loss);

let profit=row.insertCell(9);
profit.innerText="-";

let del=row.insertCell(10);
del.innerHTML="🗑";

win.onclick=()=>{

calcCLV(row);

if(stake === 0){
    row.dataset.result="win";
    profit.innerText="0";
    profit.style.color="gray";
    win.disabled=true;
    loss.disabled=true;
    updateTotals();
    saveStorage();
    return;
}

let p = odds*stake-stake;
BANKROLL += p;

profit.innerText=p.toFixed(2);
profit.style.color="green";
row.dataset.result="win";
win.disabled=true;
loss.disabled=true;

localStorage.setItem("bankroll", BANKROLL);
updateTotals();
saveStorage();
};

loss.onclick=()=>{

calcCLV(row);

if(stake === 0){
    row.dataset.result="loss";
    profit.innerText="0";
    profit.style.color="gray";
    win.disabled=true;
    loss.disabled=true;
    updateTotals();
    saveStorage();
    return;
}

BANKROLL -= stake;

profit.innerText=(-stake).toFixed(2);
profit.style.color="red";
row.dataset.result="loss";
win.disabled=true;
loss.disabled=true;

localStorage.setItem("bankroll", BANKROLL);
updateTotals();
saveStorage();
};

del.onclick=()=>{
row.remove();
updateTotals();
saveStorage();
};

updateTotals();
saveStorage();
}

// ===== AUTO SETTLE SYSTEM =====
async function autoSettle(){

let table=document.getElementById("log");

for(let i=1;i<table.rows.length;i++){

let row=table.rows[i];

// spring over hvis allerede afgjort
if(row.dataset.result) continue;

// spring over hvis ikke auto bet
if(!row.dataset.fixtureId) continue;

try{

let res=await fetch(
`${API_URL}/fixtures?id=${row.dataset.fixtureId}`,
{headers:{ "x-apisports-key": API_KEY }}
);

let data=await res.json();
if(!data.response.length) continue;

let match=data.response[0];

// kun hvis færdig
const finishedStatuses = ["FT","AET","PEN"];

if(!finishedStatuses.includes(match.fixture.status.short))
continue;

let hg=match.goals.home;
let ag=match.goals.away;

let bet=row.cells[1].innerText;
let odds=parseFloat(row.cells[2].innerText)||0;
let stake=parseFloat(row.cells[3].innerText)||0;

let profitCell=row.cells[9];

if(stake === 0){

let won = marketHit(bet,hg,ag);

if(won){
row.dataset.result="win";
profitCell.innerText="0";
profitCell.style.color="gray";
}else{
row.dataset.result="loss";
profitCell.innerText="0";
profitCell.style.color="gray";
}

row.cells[8].querySelectorAll("button")
.forEach(b=>b.disabled=true);

continue;
}

let won=marketHit(bet,hg,ag);

if(won){
let p=odds*stake-stake;
BANKROLL+=p;
profitCell.innerText=p.toFixed(2);
profitCell.style.color="green";
row.dataset.result="win";
}else{
BANKROLL-=stake;
profitCell.innerText=(-stake).toFixed(2);
profitCell.style.color="red";
row.dataset.result="loss";
}

await calcCLV(row);

// disable knapper
row.cells[8].querySelectorAll("button")
.forEach(b=>b.disabled=true);

localStorage.setItem("bankroll",BANKROLL);

}catch(e){
console.log("Auto settle fejl",e);
}

}

updateTotals();
saveStorage();

alert("Auto settle færdig ✅");
}

async function calcCLV(row){

if(!row.dataset.fixtureId) return;

let betOdds = parseFloat(row.cells[2].innerText);
let betName = row.cells[1].innerText;

try{

let res = await fetch(
`${API_URL}/odds?fixture=${row.dataset.fixtureId}`,
{headers:{ "x-apisports-key": API_KEY }}
);

let data = await res.json();
if(!data.response.length){
let cell=row.cells[7];
cell.innerText="0.0%";
cell.style.color="gray";
return;
}

let bookmakers = data.response[0].bookmakers;

let closingOdds=null;

for(let b of bookmakers){

for(let m of b.bets){

// ===== OVER / UNDER =====
if(
m.name==="Goals Over/Under" ||
m.name==="Over/Under"
){

let parts = betName.split(" ");
let side = parts[0];
let line = parts[1];

let val = m.values.find(v =>
(v.value === side && v.handicap === line) ||
v.value === betName
);

if(val){
closingOdds = parseFloat(val.odd);
break;
}
}

// ===== MATCH RESULT =====
if(m.name==="Match Winner"){

let map={
"Hjemmesejr":"Home",
"Ude sejr":"Away",
"Uafgjort":"Draw",
"1X":"Home/Draw",
"X2":"Draw/Away",
"12":"Home/Away"
};

let val=m.values.find(v=>v.value===map[betName]);

if(val){
closingOdds=parseFloat(val.odd);
break;
}

}

// ===== BTTS =====
if(m.name==="Both Teams Score" && betName==="BTTS"){

let val=m.values.find(v=>v.value==="Yes");

if(val){
closingOdds=parseFloat(val.odd);
break;
}

}

}

if(closingOdds) break;

}

if(!closingOdds){
let cell=row.cells[7];
cell.innerText="No odds";
cell.style.color="gray";
return;
}

let clv = (betOdds / closingOdds) - 1;

let cell=row.cells[7];

cell.innerText =
betOdds.toFixed(2) +
" → " +
closingOdds.toFixed(2) +
" (" +
(clv*100).toFixed(1) +
"%)";

if(clv > 0){
cell.style.color="green";
}
else if(clv < 0){
cell.style.color="red";
}
else{
cell.style.color="gray";
}

saveStorage();

}catch(e){

console.log("CLV fejl",e);

}

}

async function updateCLV(){

let table=document.getElementById("log");

for(let i=1;i<table.rows.length;i++){

let row=table.rows[i];

if(!row.dataset.fixtureId) continue;
if(row.cells[7].innerText !== "-") continue;

await calcCLV(row);

}

}
